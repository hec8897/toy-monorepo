name: Auto PR Description

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  update-pr-description:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate PR description
        id: generate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;

            // PR 정보 가져오기
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            // 기존 body가 있으면 스킵 (빈 문자열이나 짧은 내용 제외)
            const existingBody = pr.data.body || '';
            const MIN_BODY_LENGTH = 50;

            if (existingBody.trim().length >= MIN_BODY_LENGTH) {
              console.log('PR already has a description. Skipping auto-generation.');
              core.setOutput('skipped', 'true');
              return existingBody;
            }

            console.log('Generating PR description...');
            core.setOutput('skipped', 'false');

            // 커밋 목록 가져오기
            const commits = await github.rest.pulls.listCommits({
              owner,
              repo,
              pull_number: prNumber
            });
            
            // 파일 변경 사항 가져오기
            const files = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: prNumber
            });
            
            // 통계 계산
            let additions = 0;
            let deletions = 0;
            files.data.forEach(file => {
              additions += file.additions;
              deletions += file.deletions;
            });
            
            // PR 설명 생성
            let description = `## 🔄 변경 사항 요약\n\n`;
            description += `이 PR은 **${commits.data.length}개의 커밋**과 **${files.data.length}개의 파일** 변경을 포함합니다.\n\n`;
            
            // 커밋 목록
            description += `## 📝 커밋 목록\n\n`;
            commits.data.forEach(commit => {
              const message = commit.commit.message.split('\n')[0]; // 첫 줄만
              const author = commit.commit.author.name;
              const sha = commit.sha.substring(0, 7);
              description += `- \`${sha}\` ${message} - *${author}*\n`;
            });
            
            // 파일 변경 사항
            description += `\n## 📂 수정된 파일\n\n`;
            
            // 파일을 타입별로 분류
            const filesByType = {
              frontend: [],
              backend: [],
              packages: [],
              config: [],
              docs: [],
              other: []
            };
            
            files.data.forEach(file => {
              const fileInfo = {
                name: file.filename,
                additions: file.additions,
                deletions: file.deletions,
                status: file.status
              };
              
              if (file.filename.startsWith('apps/frontend/')) {
                filesByType.frontend.push(fileInfo);
              } else if (file.filename.startsWith('apps/backend/')) {
                filesByType.backend.push(fileInfo);
              } else if (file.filename.startsWith('packages/')) {
                filesByType.packages.push(fileInfo);
              } else if (file.filename.match(/\.(json|ya?ml|config\.(js|ts|mjs|cjs)|\.config\.(js|ts|mjs|cjs))$/)) {
                filesByType.config.push(fileInfo);
              } else if (file.filename.match(/\.(md|txt)$/)) {
                filesByType.docs.push(fileInfo);
              } else {
                filesByType.other.push(fileInfo);
              }
            });
            
            // 각 타입별로 파일 출력
            const printFiles = (files, emoji, title) => {
              if (files.length > 0) {
                description += `\n### ${emoji} ${title}\n\n`;
                files.forEach(file => {
                  const statusEmoji = file.status === 'added' ? '🆕' : 
                                     file.status === 'removed' ? '🗑️' : 
                                     file.status === 'renamed' ? '📝' : '✏️';
                  description += `- ${statusEmoji} \`${file.name}\` (+${file.additions}, -${file.deletions})\n`;
                });
              }
            };
            
            printFiles(filesByType.frontend, '🎨', 'Frontend');
            printFiles(filesByType.backend, '⚙️', 'Backend');
            printFiles(filesByType.packages, '📦', 'Shared Packages');
            printFiles(filesByType.config, '🔧', 'Configuration');
            printFiles(filesByType.docs, '📚', 'Documentation');
            printFiles(filesByType.other, '📄', 'Other');
            
            // 통계
            description += `\n## 📊 통계\n\n`;
            description += `- **${files.data.length}** files changed\n`;
            description += `- **${additions}** insertions(+)\n`;
            description += `- **${deletions}** deletions(-)\n`;
            description += `- **${additions + deletions}** total changes\n`;
            
            // 브랜치 정보
            description += `\n## 🌲 브랜치\n\n`;
            description += `- **From**: \`${pr.data.head.ref}\`\n`;
            description += `- **To**: \`${pr.data.base.ref}\`\n`;
            
            // 푸터
            description += `\n---\n`;
            description += `*🤖 이 설명은 자동으로 생성되었습니다.*\n`;
            
            // PR 업데이트
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              body: description
            });
            
            console.log('PR description updated successfully!');
            return description;

      - name: Comment on PR
        if: steps.generate.outputs.skipped != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: '✅ PR 설명이 자동으로 업데이트되었습니다! 필요시 직접 수정하실 수 있습니다.'
            });

