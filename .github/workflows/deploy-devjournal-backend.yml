name: Deploy — DevJournal Backend (dev)

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/devjournal/backend/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-devjournal-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to EC2 (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Prune
        run: pnpm nx run devjournal-backend:prune

      - name: Upload build artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEVJOURNAL_EC2_HOST }}
          username: ${{ secrets.DEVJOURNAL_EC2_USERNAME }}
          key: ${{ secrets.DEVJOURNAL_EC2_SSH_KEY }}
          port: ${{ secrets.DEVJOURNAL_EC2_PORT }}
          source: 'dist/apps/devjournal/backend/'
          target: '/home/ubuntu/devjournal-backend/'
          strip_components: 4

      - name: Install dependencies & Restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEVJOURNAL_EC2_HOST }}
          username: ${{ secrets.DEVJOURNAL_EC2_USERNAME }}
          key: ${{ secrets.DEVJOURNAL_EC2_SSH_KEY }}
          port: ${{ secrets.DEVJOURNAL_EC2_PORT }}
          script: |
            cd /home/ubuntu/devjournal-backend
            pnpm install --prod
            pm2 reload devjournal-backend || pm2 start /home/ubuntu/devjournal-backend/ecosystem.config.js
