name: CI — DevJournal

on:
  pull_request:
    branches:
      - develop
    paths:
      - 'apps/devjournal/backend/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

jobs:
  build:
    name: Lint & Build (devjournal-backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm nx lint devjournal-backend

      - name: Build
        run: pnpm nx build devjournal-backend
